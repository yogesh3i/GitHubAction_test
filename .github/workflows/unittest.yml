name: Python CI

# Triger the workflow on any push to the main branch or pull request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: checkout code
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    # step 3: Install dependencies 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    # step 4: Runtest
    - name: Test with pytest
      run: |
        pytest
